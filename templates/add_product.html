```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/products">
            Inventory System
        </a>

    </div>

</nav>



<div class="container mt-5">


    <div class="card shadow">

        <div class="card-body">


            <h2 class="mb-4">
                Add New Product
            </h2>



            <form method="POST" action="/add_product">


                <div class="mb-3">

                    <label class="form-label">
                        Product Name
                    </label>

                    <input 
                    type="text"
                    class="form-control"
                    name="name"
                    required>

                </div>



                <div class="mb-3">

                    <label class="form-label">
                        Price
                    </label>

                    <input 
                    type="number"
                    class="form-control"
                    name="price"
                    required>

                </div>




                <div class="mb-3">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input 
                    type="number"
                    class="form-control"
                    name="quantity"
                    required>

                </div>



                <button class="btn btn-success">

                    Add Product

                </button>



                <a href="/products" class="btn btn-secondary">

                    Cancel

                </a>


            </form>


        </div>

    </div>


</div>


</body>

</html>
```
